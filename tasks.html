<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>المهام المتغيرة</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container mt-5">
      <h1 id="group-title" class="text-center mb-4 fw-bold text-primary"></h1>
      <div class="card shadow-sm">
        <div class="card-body">
          <table class="table table-hover text-center">
            <thead class="table-dark">
              <tr>
                <th>اليوم والتاريخ</th>
                <th>الساعة</th>
                <th>نوع المهمة</th>
                <th>موقع المهمة</th>
                <th>المطلوب</th>
              </tr>
            </thead>
            <tbody id="task-body"></tbody>
          </table>
          <p class="mt-3 text-muted" id="managerSignature">
            توقيع المدير: <span id="signatureText">___________________</span>
          </p>
        </div>
      </div>

      <div class="text-center mt-4">
        <button class="btn btn-warning me-2" onclick="printTable()">
          <i class="fas fa-print"></i> طباعة
        </button>
        <button class="btn btn-info me-2" onclick="sendToWhatsApp()">
          <i class="fab fa-whatsapp"></i> إرسال للمدير
        </button>
        <a href="index.html" class="btn btn-secondary">
          <i class="fas fa-arrow-right"></i> رجوع
        </a>
        <button
          class="btn btn-info me-2"
          data-bs-toggle="modal"
          data-bs-target="#signatureModal"
        >
          <i class="fas fa-signature"></i> تعديل توقيع المدير
        </button>
      </div>
    </div>

    <!-- Modal لتوقيع المدير -->
    <div
      class="modal fade"
      id="signatureModal"
      tabindex="-1"
      aria-labelledby="signatureModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="signatureModalLabel">توقيع المدير</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <div class="mb-3">
              <label for="signatureInput" class="form-label"
                >أدخل التوقيع</label
              >
              <input
                type="text"
                class="form-control"
                id="signatureInput"
                placeholder="أدخل التوقيع هنا"
              />
            </div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              إغلاق
            </button>
            <button
              type="button"
              class="btn btn-primary"
              onclick="saveSignature()"
            >
              حفظ التوقيع
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
